server.port=8082
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Disable Redis for local testing if not available
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mock values for required env vars
JWT_SECRET=your-256-bit-secret-key-here-make-it-long-enough-for-hs256
STRIPE_SECRET_KEY=sk_test_placeholder
STRIPE_WEBHOOK_SECRET=whsec_placeholder
GOOGLE_CLIENT_ID=your-google-client-id
GOOGLE_CLIENT_SECRET=your-google-client-secret
MAIL_USERNAME=test@example.com
MAIL_PASSWORD=password

# Disable JobRunr for local smoke test to avoid DB issues
org.jobrunr.background-job-server.enabled=false
org.jobrunr.dashboard.enabled=false
