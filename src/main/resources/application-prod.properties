spring.application.name=mt-saas-backend-clean

# Database - Production settings
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.datasource.url=${DATABASE_URL}
#spring.datasource.username=${DATABASE_USERNAME}
#spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# HikariCP Connection Pool (Supabase free tier: max 3 connections)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000

# Lemon Squeezy - Production keys
lemon-squeezy.api-key=${LEMON_SQUEEZY_API_KEY}
lemon-squeezy.webhook.secret=${LEMON_SQUEEZY_WEBHOOK_SECRET}
lemon-squeezy.store-id=${LEMON_SQUEEZY_STORE_ID}
lemon-squeezy.variant.starter=${LEMON_SQUEEZY_VARIANT_STARTER}
lemon-squeezy.variant.professional=${LEMON_SQUEEZY_VARIANT_PRO}
lemon-squeezy.variant.enterprise=${LEMON_SQUEEZY_VARIANT_ENTERPRISE}

# Logging
logging.level.com.mtsaas=WARN
logging.level.org.springframework=WARN

# Frontend
app.frontend.url=${FRONTEND_URL}

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://swiftconverter-backend-production.up.railway.app/login/oauth2/code/google

# JWT
app.jwt.secret-key=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}
app.jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:refresh_token}
app.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:true}
app.jwt.refresh-cookie-same-site=${JWT_REFRESH_COOKIE_SAME_SITE:None}


spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
